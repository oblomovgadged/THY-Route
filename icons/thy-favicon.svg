<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- THY Official Logo Recreation: Red circle + White crane/goose -->
  <circle cx="256" cy="256" r="256" fill="#E31837"/>
  <!-- Stylized crane/goose bird silhouette (THY "yaban kazı" emblem) -->
  <g transform="translate(256,256) scale(1.6)" fill="white">
    <!-- Bird body and wing -->
    <path d="M-40,60 C-60,40 -80,10 -70,-30 C-65,-50 -45,-70 -20,-80 C0,-88 25,-82 40,-70 C55,-58 65,-40 60,-15 C58,-5 50,5 40,15 L20,30 C10,38 -5,48 -20,55 Z" opacity="0.95"/>
    <!-- Extended wing detail -->
    <path d="M-20,-80 C-35,-75 -55,-55 -70,-30 C-78,-15 -80,5 -75,20 L-40,-10 C-30,-30 -15,-55 0,-70 Z" opacity="0.9"/>
    <!-- Head and beak -->
    <ellipse cx="-15" cy="-82" rx="12" ry="10"/>
    <path d="M-27,-82 L-45,-78 L-27,-75 Z"/>
    <!-- Tail feathers -->
    <path d="M40,15 C50,5 65,-5 75,0 C80,5 78,15 70,25 C60,35 45,40 35,35 Z" opacity="0.85"/>
  </g>
</svg>
